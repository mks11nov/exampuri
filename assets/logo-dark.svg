    <tspan x="88" y="46" fill="#ffffff">Exam</tspan><tspan fill="#FF6B35">Puri</tspan>
  </text>

  <!-- Tagline -->
  <text x="89" y="64"
        font-family="Poppins, Nunito, Segoe UI, sans-serif"
