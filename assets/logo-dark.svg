<svg width="320" height="80" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark background pill -->
  <rect x="0" y="0" width="320" height="80" rx="16" fill="#0f172a"/>

  <!-- Mini icon mark -->
  <rect x="14" y="10" width="60" height="60" rx="14" fill="#1565C0"/>
  <rect x="20" y="16" width="48" height="48" rx="10" fill="#1A237E"/>

  <!-- Mini E -->
  <rect x="28" y="24" width="6"  height="32" rx="3" fill="#ffffff"/>
  <rect x="28" y="24" width="24" height="6"  rx="3" fill="#ffffff"/>
  <rect x="28" y="37" width="18" height="5"  rx="2.5" fill="#ffffff"/>
  <rect x="28" y="50" width="24" height="6"  rx="3" fill="#ffffff"/>

  <!-- Mini rank arrow -->
