  <circle cx="59" cy="27" r="4" fill="#FF6B35"/>
  <polyline points="55,34 59,27 63,33" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="36" cy="14" r="2" fill="#FFC947"/>

  <!-- Wordmark white + orange -->
